name: Deploy redirect to GitHub Pages

# Production is hosted on Vercel (cv.luismarrero.me). GitHub Pages only
# serves the redirect page in redirect/ so the old luismarrer.github.io
# URL keeps working.

on:
  push:
    branches: [ main ]
    paths:
      - 'redirect/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload redirect page
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
