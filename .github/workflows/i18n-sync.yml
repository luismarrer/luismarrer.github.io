# i18n-sync — translator bot (PRD §6.2, roadmap R2.1).
#
# On every push to main that touches a CV file, re-run the coherence check
# against the pre-push commit. If the languages diverged, translate exactly
# the fields that changed and open a PR from i18n/sync-<sha>.
#
# Prerequisites (external, configured once by the repo owner):
#  - secrets.OPENAI_API_KEY            → translation engine
#  - secrets.I18N_BOT_TOKEN (PAT/App)  → pushing the branch + opening the PR
#    with a token that DOES trigger Vercel previews and required checks.
#    Falls back to GITHUB_TOKEN, which creates the PR but won't trigger
#    other workflows (PRD §6.5).

name: i18n-sync

on:
  push:
    branches: [main]
    paths:
      - "cv-en.json"
      - "cv-es.json"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history for the baseline diff)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.I18N_BOT_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Detect divergence against the pre-push commit
        id: check
        run: |
          if node scripts/i18n-check.mjs --base "${{ github.event.before }}"; then
            echo "coherent=true" >> "$GITHUB_OUTPUT"
          else
            echo "coherent=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Translate the changed fields
        if: steps.check.outputs.coherent == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/i18n-sync.mjs --base "${{ github.event.before }}" --json

      - name: Open the sync PR
        if: steps.check.outputs.coherent == 'false'
        env:
          GH_TOKEN: ${{ secrets.I18N_BOT_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- cv-en.json cv-es.json; then
            echo "translator produced no changes — nothing to open"
            exit 0
          fi

          short_sha="$(git rev-parse --short "${{ github.sha }}")"
          branch="i18n/sync-${short_sha}"
          git config user.name "i18n-sync bot"
          git config user.email "actions@users.noreply.github.com"
          git switch -c "$branch"
          git add cv-en.json cv-es.json
          git commit -m "i18n: sync translations for ${short_sha}"
          git push -u origin "$branch"

          gh pr create \
            --title "i18n: sync translations for ${short_sha}" \
            --body "$(cat <<'EOF'
          Automatic translation of the CV fields that changed in ${{ github.sha }}.

          - Review the Vercel preview (links are commented once the deploy is ready)
            on `/en/` and `/es/` — no need to read the JSON.
          - Merge directly, edit first, or delegate with a `/delegate` comment or
            the `auto-merge` label (repo owner only).

          Generated by the i18n-sync workflow.
          EOF
          )" \
            --base main \
            --head "$branch"
